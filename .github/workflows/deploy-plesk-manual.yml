name: Deploy to Plesk

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch yang akan di-deploy
        required: true
        default: main
      project_path:
        description: Path project di server Plesk
        required: true
        default: /law.fts.biz.id/wp-content/themes/fts-law

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: plesk
    env:
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
      DEPLOY_PATH: ${{ github.event.inputs.project_path || '/law.fts.biz.id/wp-content/themes/fts-law' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KE }}
        run: |
          [ -n "$SSH_HOST" ] || (echo "::error::Missing secret: SSH_HOST" && exit 1)
          [ -n "$SSH_USER" ] || (echo "::error::Missing secret: SSH_USER" && exit 1)
          [ -n "$SSH_PRIVATE_KEY" ] || (echo "::error::Missing secret: SSH_PRIVATE_KEY" && exit 1)

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KE }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"
            echo "Deploy selesai"